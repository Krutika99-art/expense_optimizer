{% extends 'base.html' %}

{% block title %}Forgot Password | Expense Optimizer{% endblock %}
{% block public_nav %}{% endblock %}

{% block content %}
<section class="container auth-section">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-10">
            <div class="card border-0 shadow-soft p-4 p-md-5">
                <h2 class="mb-2">Reset Password</h2>
                <p class="text-muted mb-4">Reset your password directly using username and email.</p>

                <form method="post" novalidate>
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_username" class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" id="id_username" required>
                    </div>
                    <div class="mb-4">
                        <label for="id_email" class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" id="id_email" required>
                    </div>
                    <div class="mb-3">
                        <label for="id_new_password1" class="form-label">New Password</label>
                        <input type="password" name="new_password1" class="form-control" id="id_new_password1" required>
                    </div>
                    <div class="mb-4">
                        <label for="id_new_password2" class="form-label">Confirm New Password</label>
                        <input type="password" name="new_password2" class="form-control" id="id_new_password2" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Reset Password</button>
                </form>

                <p class="mt-4 mb-0 text-center text-muted">
                    Remembered your password? <a href="{% url 'login' %}">Back to login</a>
                </p>
            </div>
        </div>
    </div>
</section>
{% endblock %}
