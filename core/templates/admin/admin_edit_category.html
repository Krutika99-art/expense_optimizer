{% extends 'base.html' %}

{% block title %}Edit Category | Expense Optimizer{% endblock %}

{% block content %}
<section class="admin-management-page">
    <div class="card border-0 shadow-sm admin-management-card">
        <div class="card-body">
            <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
                <div>
                    <h1 class="h4 mb-1">Edit Category</h1>
                    <p class="text-muted mb-0">Update the category name or type for system-wide use.</p>
                </div>
                <a href="{% url 'admin_categories' %}" class="btn btn-outline-primary">Back to Categories</a>
            </div>

            <form method="post" class="row g-3">
                {% csrf_token %}
                <div class="col-md-6">
                    <label for="name" class="form-label">Category Name</label>
                    <input
                        type="text"
                        class="form-control"
                        id="name"
                        name="name"
                        value="{{ form_data.name }}"
                        placeholder="e.g., School Fees"
                    >
                </div>
                <div class="col-md-6">
                    <label for="category_type" class="form-label">Category Type</label>
                    <select class="form-select" id="category_type" name="category_type">
                        <option value="">Select category type</option>
                        {% for type_item in category_types %}
                            <option value="{{ type_item.id }}" {% if form_data.category_type == type_item.id|stringformat:"s" %}selected{% endif %}>
                                {{ type_item.name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-12 d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <a href="{% url 'admin_category_types' %}" class="btn btn-outline-secondary">Manage Types</a>
                    <a href="{% url 'admin_categories' %}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
